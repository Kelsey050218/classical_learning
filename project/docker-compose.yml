# 《经典常谈》伴学平台 - Docker 配置
# 注意: 此文件仅用于运行 MySQL 数据库
# 前后端不通过 Docker 运行，详见 DEPLOY.md

version: '3.8'
services:
  # MySQL 数据库服务
  # 当前实际使用的数据库是独立的 Docker 容器 (mysql-sosd)
  # 此配置仅供参考，实际部署时不需要额外启动数据库容器
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-classics_learning}
      MYSQL_USER: ${DB_USER:-classics_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-classics_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
